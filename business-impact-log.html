  <title>Business Impact Log · Llyon Farms</title>

  <style>
    :root {
      --bg-page: #F4F4F0; --bg-card: #FFFFFF; --bg-surface: #EBF7D8;
      --bg-nav: #1A3D10; --bg-input: #FFFFFF; --bg-modal: rgba(26,61,16,0.6);
      --text-primary: #1C1C18; --text-secondary: #8A8A7A; --text-heading: #1A3D10;
      --text-muted: #D8D8CE; --border: #D8D8CE; --border-focus: #6CBF2E;
      --lime: #6CBF2E; --deep: #1A3D10; --forest: #2A5E18; --grove: #3D8A20;
      --bright: #8DD44A; --solar: #F2D024; --solar-pale: #FBF0A0;
      --ink: #1C1C18; --ash: #8A8A7A; --pebble: #D8D8CE;
      --entry-card-bg: #FFFFFF; --entry-card-border: #D8D8CE;
      --detail-bg: #EBF7D8; --gap-bg: #FFFFFF; --suggestion-bg: #EBF7D8;
    }
    :root.dark {
      --bg-page: #0d1a08; --bg-card: #1A2E10; --bg-surface: #142808;
      --bg-nav: #0a1505; --bg-input: #142808; --bg-modal: rgba(0,0,0,0.85);
      --text-primary: #EBF7D8; --text-secondary: #8DD44A; --text-heading: #8DD44A;
      --text-muted: #2A5E18; --border: #2A5E18; --border-focus: #6CBF2E;
      --entry-card-bg: #1A2E10; --entry-card-border: #2A5E18;
      --detail-bg: #142808; --gap-bg: #1A2E10; --suggestion-bg: #142808;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-page); color: var(--text-primary);
      font-family: 'Manrope', Arial, sans-serif; min-height: 100vh;
      -webkit-font-smoothing: antialiased; transition: background 0.2s, color 0.2s;
    }
    input, select, textarea {
      background: var(--bg-input) !important; color: var(--text-primary) !important;
      border-color: var(--border) !important; font-family: 'Manrope', Arial, sans-serif;
      transition: background 0.2s, color 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--border-focus) !important;
      box-shadow: 0 0 0 2px rgba(108,191,46,0.2);
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .login-screen {
      min-height: 100vh; background: #0a1505;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 32px 24px;
    }
    .pin-input {
      width: 100%; max-width: 280px; text-align: center;
      font-size: 28px; letter-spacing: 12px; padding: 16px; border-radius: 12px;
      border: 2px solid #2A5E18 !important; background: #050e03 !important;
      color: #8DD44A !important; font-family: 'Manrope', monospace;
    }
    .pin-input:focus { border-color: #6CBF2E !important; box-shadow: 0 0 0 3px rgba(108,191,46,0.3); }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }
    .fade-in { animation: fadeIn 0.2s ease; }
    .shake { animation: shake 0.3s ease; }
    @media (max-width: 600px) { .two-col { grid-template-columns: 1fr !important; } }
  </style>

const MAX_ATTEMPTS = 5;
const LOCKOUT_MS = 30 * 60 * 1000;

async function hashPin(pin) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [selectedUser, setSelectedUser] = useState(null);
  const [pin, setPin] = useState('');
  const [error, setError] = useState('');
  const [shake, setShake] = useState(false);
  const [locked, setLocked] = useState(false);
  const [lockRemaining, setLockRemaining] = useState(0);
  const [attempts, setAttempts] = useState(0);

  useEffect(() => {
    const lockUntil = parseInt(localStorage.getItem('bil_lock_until') || '0');
    if (lockUntil > Date.now()) {
      setLocked(true);
      const tick = () => {
        const rem = Math.ceil((lockUntil - Date.now()) / 60000);
        if (rem <= 0) { setLocked(false); localStorage.removeItem('bil_lock_until'); }
        else setLockRemaining(rem);
      };
      tick();
      const iv = setInterval(tick, 10000);
      return () => clearInterval(iv);
    }
  }, []);

  const handleSubmit = async () => {
    if (!selectedUser || pin.length < 4 || locked) return;
    const inputHash = await hashPin(pin);
    if (inputHash === USERS_CONFIG[selectedUser].pinHash) {
      localStorage.setItem('bil_user', selectedUser);
      localStorage.removeItem('bil_lock_until');
      onLogin(selectedUser);
    } else {
      const na = attempts + 1;
      setAttempts(na);
      setPin('');
      setShake(true);
      setTimeout(() => setShake(false), 400);
      if (na >= MAX_ATTEMPTS) {
        const lockUntil = Date.now() + LOCKOUT_MS;
        localStorage.setItem('bil_lock_until', lockUntil.toString());
        setLocked(true);
        setLockRemaining(30);
        setError('Too many attempts. Locked for 30 minutes.');
      } else {
        setError(`Incorrect PIN. ${MAX_ATTEMPTS - na} attempt${MAX_ATTEMPTS - na === 1 ? '' : 's'} remaining.`);
      }
    }
  };

  return (
    <div className="login-screen">
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:32, width:'100%', maxWidth:360 }}>
        <div style={{ textAlign:'center' }}>
          <img src={LOGO_WHITE} alt="Newllyon Limited" style={{ height:48, width:'auto', marginBottom:16 }} />
          <div style={{ color:'#8DD44A', fontSize:11, fontWeight:700, letterSpacing:2, textTransform:'uppercase', marginBottom:4 }}>Llyon Farms</div>
          <div style={{ color:'#EBF7D8', fontFamily:"'DM Serif Display', Georgia, serif", fontSize:24 }}>Business Impact Log</div>
        </div>

        {!selectedUser ? (
          <div style={{ width:'100%' }}>
            <div style={{ color:'#8DD44A', fontSize:11, fontWeight:700, letterSpacing:1, textTransform:'uppercase', textAlign:'center', marginBottom:16 }}>Select your profile</div>
            <div style={{ display:'flex', gap:12 }}>
              {Object.entries(USERS_CONFIG).map(([key, user]) => (
                <button key={key} onClick={() => setSelectedUser(key)} style={{
                  flex:1, padding:'20px 16px', borderRadius:12, background:'#0a1505',
                  border:`2px solid ${user.color}`, cursor:'pointer',
                  display:'flex', flexDirection:'column', alignItems:'center', gap:10,
                }}>
                  <div style={{ width:48, height:48, borderRadius:24, background:user.color, display:'flex', alignItems:'center', justifyContent:'center', fontSize:16, fontWeight:700, color:'#1A3D10' }}>{user.initials}</div>
                  <div style={{ color:'#EBF7D8', fontSize:13, fontWeight:700 }}>{user.name}</div>
                </button>
              ))}
            </div>
          </div>
        ) : (
          <div style={{ width:'100%', display:'flex', flexDirection:'column', alignItems:'center', gap:16 }}>
            <div style={{ display:'flex', alignItems:'center', gap:12 }}>
              <div style={{ width:40, height:40, borderRadius:20, background:USERS_CONFIG[selectedUser].color, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, fontWeight:700, color:'#1A3D10' }}>
                {USERS_CONFIG[selectedUser].initials}
              </div>
              <div style={{ color:'#EBF7D8', fontSize:16, fontWeight:700 }}>{USERS_CONFIG[selectedUser].name}</div>
              <button onClick={() => { setSelectedUser(null); setPin(''); setError(''); }} style={{ background:'none', border:'none', color:'#2A5E18', cursor:'pointer', fontSize:13 }}>← Back</button>
            </div>
            <div style={{ color:'#8DD44A', fontSize:11, fontWeight:700, letterSpacing:1, textTransform:'uppercase' }}>Enter PIN</div>
            {locked ? (
              <div style={{ color:'#F2D024', fontSize:13, textAlign:'center', padding:'12px 20px', background:'rgba(242,208,36,0.1)', borderRadius:8, border:'1px solid #F2D024' }}>
                Locked. Try again in {lockRemaining} min{lockRemaining === 1 ? '' : 's'}.
              </div>
            ) : (
              <>
                <input
                  className={`pin-input${shake ? ' shake' : ''}`}
                  type="password" inputMode="numeric" maxLength={6}
                  value={pin}
                  onChange={e => { setPin(e.target.value.replace(/[^0-9]/g,'')); setError(''); }}
                  onKeyDown={e => e.key === 'Enter' && handleSubmit()}
                  placeholder="••••" autoFocus
                />
                {error && <div style={{ color:'#ff8060', fontSize:12, textAlign:'center' }}>{error}</div>}
                <button onClick={handleSubmit} disabled={pin.length < 4} style={{
                  background: pin.length >= 4 ? '#6CBF2E' : '#1A2E10',
                  border:'none', color: pin.length >= 4 ? '#1A3D10' : '#2A5E18',
                  borderRadius:10, padding:'14px 40px',
                  cursor: pin.length >= 4 ? 'pointer' : 'default',
                  fontSize:15, fontWeight:700, width:'100%', maxWidth:280, transition:'all 0.2s',
                }}>
                  Enter
                </button>
              </>
            )}
          </div>
        )}
        <div style={{ color:'#1A3D10', fontSize:10, textAlign:'center' }}>Newllyon Limited · Confidential</div>
      </div>
    </div>
  );
}

// ── AUTH WRAPPER ──────────────────────────────────────────────────────────────
function AuthWrapper() {
  const [activeUser, setActiveUser] = useState(null);
  const [darkMode, setDarkMode] = useState(() => localStorage.getItem('bil_dark') === 'true');
  const [ready, setReady] = useState(false);

  useEffect(() => {
    const savedDark = localStorage.getItem('bil_dark') === 'true';
    applyDarkMode(savedDark);
    setDarkMode(savedDark);
    const saved = localStorage.getItem('bil_user');
    if (saved && USERS_CONFIG[saved]) setActiveUser(saved);
    setReady(true);
  }, []);

  const toggleDark = () => {
    const next = !darkMode;
    setDarkMode(next);
    applyDarkMode(next);
    localStorage.setItem('bil_dark', next.toString());
  };

  const handleLogin = (userId) => setActiveUser(userId);
  const handleLogout = () => { localStorage.removeItem('bil_user'); setActiveUser(null); };

  if (!ready) return null;
  if (!activeUser) return <LoginScreen onLogin={handleLogin} />;

  return (
    <BILApp
      activeUser={activeUser}
      onLogout={handleLogout}
      darkMode={darkMode}
      onToggleDark={toggleDark}
    />
  );
}

// ─── DATE RANGE PRESETS ───────────────────────────────────────────────────────

function getPresetRange(preset) {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();
  const d = now.getDate();
  const iso = (dt) => dt.toISOString().split("T")[0];

  if (preset === "week") {
    const day = now.getDay();
    const mon = new Date(now); mon.setDate(d - ((day + 6) % 7));
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    return { from: iso(mon), to: iso(sun) };
  }
  if (preset === "month") {
    return { from: iso(new Date(y, m, 1)), to: iso(new Date(y, m + 1, 0)) };
  }
  if (preset === "q1") return { from: `${y}-01-01`, to: `${y}-03-31` };
  if (preset === "q2") return { from: `${y}-04-01`, to: `${y}-06-30` };
  if (preset === "q3") return { from: `${y}-07-01`, to: `${y}-09-30` };
  if (preset === "q4") return { from: `${y}-10-01`, to: `${y}-12-31` };
  if (preset === "year") return { from: `${y}-01-01`, to: `${y}-12-31` };
  return { from: "", to: "" };
}

function inRange(dateStr, from, to) {
  if (!from && !to) return true;
  if (from && dateStr < from) return false;
  if (to && dateStr > to) return false;
  return true;
}

              border: `1px solid ${activePreset === p.key ? "#7a5500" : "#2a2018"}`,
              color: activePreset === p.key ? "#e8a820" : "#6a5030",
              borderRadius: 5, padding: "4px 10px", cursor: "pointer",
              fontSize: 11, fontWeight: 600, transition: "all 0.15s",
            }}
          >
            {p.label}
          </button>
        ))}
      </div>

      {/* Manual date inputs */}
      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ color: "#3D8A20", fontSize: 11 }}>From</span>
          <input type="date" value={from} onChange={e => onChange(e.target.value, to)} style={inputStyle} />
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ color: "#3D8A20", fontSize: 11 }}>To</span>
          <input type="date" value={to} onChange={e => onChange(from, e.target.value)} style={inputStyle} />
        </div>
        {hasRange && (
          <div style={{ color: "#8A8A7A", fontSize: 11, fontStyle: "italic" }}>
            {from && to ? `${fmt(from)} → ${fmt(to)}` : from ? `From ${fmt(from)}` : `Up to ${fmt(to)}`}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── MULTI-SELECT SECTION/AREA PICKER ────────────────────────────────────────

function SectionAreaPicker({ value = [], onChange }) {
  const [addingSection, setAddingSection] = useState("");
  const [addingArea, setAddingArea] = useState("");

  const areas = addingSection ? (RACI_DATA[addingSection] || []) : [];
  const roleForArea = addingSection && addingArea
    ? (RACI_DATA[addingSection]?.find(a => a.area === addingArea)?.bukola || "")
    : "";

  const add = () => {
    if (!addingSection || !addingArea) return;
    const already = value.some(v => v.section === addingSection && v.area === addingArea);
    if (already) { setAddingArea(""); return; }
    onChange([...value, { section: addingSection, area: addingArea, role: roleForArea }]);
    setAddingArea("");
  };

  const remove = (idx) => onChange(value.filter((_, i) => i !== idx));

  const sel = {
    background: "#F4F4F0", border: "1px solid #D8D8CE", color: "#1C1C18",
    borderRadius: 6, padding: "7px 10px", fontSize: 13, width: "100%", boxSizing: "border-box",
  };

  return (
    <div>
      {value.length > 0 && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>
          {value.map((v, i) => (
            <SectionBadge key={i} section={v.section} area={v.area} role={v.role} />
          ))}
          {value.map((v, i) => (
            <span key={`rm-${i}`} onClick={() => remove(i)} style={{
              display: "none"
            }} />
          ))}
        </div>
      )}
      {value.length > 0 && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>
          {value.map((v, i) => (
            <span key={i} onClick={() => remove(i)} style={{
              cursor: "pointer", color: "#8A8A7A", fontSize: 10, background: "#D8D8CE",
              border: "1px solid #D8D8CE", borderRadius: 4, padding: "2px 7px",
            }}>✕ {v.area.length > 30 ? v.area.slice(0, 30) + "…" : v.area}</span>
          ))}
        </div>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", gap: 8, alignItems: "end" }}>
        <div>
          <div style={{ color: "#8A8A7A", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>Section</div>
          <select value={addingSection} onChange={e => { setAddingSection(e.target.value); setAddingArea(""); }} style={sel}>
            <option value="">— Select —</option>
            {Object.keys(RACI_DATA).map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </div>
        <div>
          <div style={{ color: "#8A8A7A", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>Area</div>
          <select value={addingArea} onChange={e => setAddingArea(e.target.value)} style={{ ...sel, opacity: addingSection ? 1 : 0.4 }} disabled={!addingSection}>
            <option value="">— Select —</option>
            {areas.map(a => <option key={a.area} value={a.area}>{a.area}</option>)}
          </select>
        </div>
        <button onClick={add} disabled={!addingSection || !addingArea} style={{
          background: addingSection && addingArea ? "#3a2800" : "#1a1410",
          border: `1px solid ${addingSection && addingArea ? "#7a5500" : "#2a2018"}`,
          color: addingSection && addingArea ? "#e8a820" : "#3a2e22",
          borderRadius: 6, padding: "7px 14px", cursor: addingSection && addingArea ? "pointer" : "default",
          fontSize: 13, fontWeight: 700, whiteSpace: "nowrap",
        }}>+ Add</button>
      </div>
      {roleForArea && (
        <div style={{ marginTop: 6, fontSize: 11, color: "#8A8A7A" }}>
          Your role: <span style={{ ...getRoleColor(roleForArea), fontWeight: 700, padding: "1px 6px", borderRadius: 3, background: getRoleColor(roleForArea).bg, color: getRoleColor(roleForArea).text }}>{roleForArea}</span>
        </div>
      )}
    </div>
  );
}

function MultiSelectPills({ options, value = [], onChange, placeholder }) {
  const remaining = options.filter(o => !value.includes(o));
  return (

        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 8 }}>

          ))}

// ─── CUSTOM TAGS INPUT ───────────────────────────────────────────────────────

function CustomTagInput({ value = [], onChange, allCustomTags = [] }) {
  const [input, setInput] = useState("");
  const suggestions = allCustomTags.filter(t => !value.includes(t) && t.toLowerCase().includes(input.toLowerCase()) && input.length > 0);

  const add = (tag) => {
    const clean = tag.trim();
    if (!clean || value.includes(clean)) return;
    onChange([...value, clean]);
    setInput("");
  };

  return (
    <div>
      {value.length > 0 && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 8 }}>
          {value.map(t => (
            <Chip key={t} label={`# ${t}`} color={{ bg: "#1a1a2a", text: "#9090e0", border: "#2a2a5a" }}
              onRemove={() => onChange(value.filter(x => x !== t))} />
          ))}
        </div>
      )}
      <div style={{ position: "relative" }}>
        <input
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && input.trim()) { e.preventDefault(); add(input); } }}
          placeholder="Type a tag and press Enter (e.g. Investor Narrative, Batch 1 Lesson)"
          style={{ background: "#F4F4F0", border: "1px solid #D8D8CE", color: "#1C1C18", borderRadius: 6, padding: "7px 10px", fontSize: 13, width: "100%", boxSizing: "border-box" }}
        />
        {suggestions.length > 0 && (
          <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "#FFFFFF", border: "1px solid #D8D8CE", borderRadius: 6, zIndex: 50, marginTop: 2 }}>
            {suggestions.map(s => (
              <div key={s} onClick={() => add(s)} style={{ padding: "7px 12px", cursor: "pointer", color: "#8A8A7A", fontSize: 13 }}
                onMouseEnter={e => e.currentTarget.style.background = "#1e1a14"}
                onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                # {s}
              </div>
            ))}
          </div>
        )}
      </div>
      <div style={{ color: "#D8D8CE", fontSize: 10, marginTop: 4 }}>Press Enter to add. Previously used tags auto-suggest.</div>
    </div>
  );
}

              To edit or delete this entry, go to the Log tab.
            </div>
          )}
        </div>
      )}
    </div>
  );
}

      <div style={{ color: accent ? "#e0c060" : "#a08060", fontSize: 13, lineHeight: 1.65, whiteSpace: "pre-wrap" }}>{value}</div>

// ─── REPORT VIEW ─────────────────────────────────────────────────────────────

function ReportView({ entries, companyEntries = [], activeUser = "bukola", allCustomTags, allSkills = [], onClose }) {
  const [step, setStep] = useState(1); // 1=filter, 2=build, 3=preview
  const [reportScope, setReportScope] = useState("personal"); // personal | company
  const [fRaci, setFRaci] = useState("ALL");
  const [fSection, setFSection] = useState("ALL");
  const [fCategory, setFCategory] = useState("ALL");
  const [fType, setFType] = useState("ALL");
  const [fCustomTag, setFCustomTag] = useState("ALL");
  const [fSkill, setFSkill] = useState("ALL");
  const [dateFrom, setDateFrom] = useState("");
  const [dateTo, setDateTo] = useState("");
  const [selectedFields, setSelectedFields] = useState(["problem", "summary", "impact", "metrics", "strategicNotes"]);
  const isCompany = reportScope === "company";
  const scopeEntries = isCompany ? companyEntries : entries;
  const isBukola = activeUser === "bukola";

  const filtered = scopeEntries.filter(e => {
    const raciOk = fRaci === "ALL" || (e.sectionAreas || []).some(sa => sa.role?.includes(fRaci));
    const secOk = fSection === "ALL" || (e.sectionAreas || []).some(sa => sa.section === fSection);
    const catOk = fCategory === "ALL" || (e.categories || []).includes(fCategory);
    const typeOk = fType === "ALL" || e.type === fType;
    const tagOk = fCustomTag === "ALL" || (e.customTags || []).includes(fCustomTag);
    const skillOk = fSkill === "ALL" || (e.skills || []).includes(fSkill);
    const dateOk = inRange(e.date || "", dateFrom, dateTo);
    return raciOk && secOk && catOk && typeOk && tagOk && skillOk && dateOk;
  }).sort((a, b) => b.date.localeCompare(a.date));

  const toggleField = (key) => {
    setSelectedFields(prev =>
      prev.includes(key) ? prev.filter(k => k !== key) : [...prev, key]
    );
  };

  const toggleGroup = (group) => {
    const keys = group.fields.map(f => f.key);
    const allSelected = keys.every(k => selectedFields.includes(k));
    if (allSelected) {
      setSelectedFields(prev => prev.filter(k => !keys.includes(k)));
    } else {
      setSelectedFields(prev => [...new Set([...prev, ...keys])]);
    }
  };

  const buildCopyText = () => {
    const rangeLabel = dateFrom || dateTo
      ? `Period: ${dateFrom ? fmt(dateFrom) : "Start"} → ${dateTo ? fmt(dateTo) : "Today"}\n`
      : "";
    const fieldsList = selectedFields.map(k => FIELD_LABEL_MAP[k]).filter(Boolean).join(", ");
    const scopeLabel = isCompany ? "LLYON FARMS — COMPANY REPORT" : "BUSINESS IMPACT LOG — CUSTOM REPORT";
    const header = `${scopeLabel}\n${rangeLabel}Entries: ${filtered.length} · Fields: ${fieldsList}\n${"═".repeat(50)}\n\n`;
    const body = filtered.map(e => {
      const lines = [
        `${e.title}`,
        `${e.type} · ${fmt(e.date)}`,
        (e.sectionAreas || []).map(sa => `  ${sa.role} · ${sa.section} › ${sa.area}`).join("\n"),
        "",
      ];
      selectedFields.forEach(key => {
        const val = e[key];
        if (val) lines.push(`${FIELD_LABEL_MAP[key] || key}:\n${val}`);
      });
      return lines.filter((l, i) => !(i > 3 && l === "")).join("\n");
    }).join(`\n\n${"─".repeat(50)}\n\n`);
    return header + body;
  };

  const copy = () => {
    navigator.clipboard.writeText(buildCopyText()).then(() => alert("Report copied!"));
  };

  const sel = {
    background: "#F4F4F0", border: "1px solid #D8D8CE", color: "#8A8A7A",
    borderRadius: 6, padding: "6px 10px", fontSize: 12,
  };

  const stepBtn = (n, label) => (
    <button
      onClick={() => setStep(n)}
      style={{
        background: step === n ? "#3a2800" : step > n ? "#0e1a0e" : "#EBF7D8",
        border: `1px solid ${step === n ? "#7a5000" : step > n ? "#1a4a1a" : "#1e1a14"}`,
        color: step === n ? "#e8a820" : step > n ? "#50a050" : "#4a3820",
        borderRadius: 6, padding: "6px 14px", cursor: "pointer",
        fontSize: 12, fontWeight: 700,
      }}
    >
      {step > n ? "✓ " : ""}{n}. {label}
    </button>
  );

  return (
    <div>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
        <div>
          <h2 style={{ color: "#1A3D10", fontFamily: "'DM Serif Display', Georgia, serif", margin: "0 0 6px", fontSize: 18 }}>
            Report Builder
          </h2>

          {/* ── SCOPE TOGGLE ── */}
          <div style={{ display: "flex", gap: 0, background: "#EBF7D8", border: "1px solid #D8D8CE", borderRadius: 8, padding: 3, marginBottom: 12, maxWidth: 360 }}>
            <button
              onClick={() => { setReportScope("personal"); setStep(1); }}
              style={{
                flex: 1, padding: "7px 12px", borderRadius: 6, border: "none",
                background: !isCompany ? "#1A3D10" : "none",
                color: !isCompany ? "#EBF7D8" : "#3D8A20",
                fontSize: 12, fontWeight: 700, cursor: "pointer", transition: "all 0.15s",
              }}
            >
              My Entries
            </button>
            <button
              onClick={() => { setReportScope("company"); setStep(1); }}

function isOwnershipRole(role) {
  if (!role) return false;
  return role.includes("A") || role.includes("R");
}

function getOwnershipAreas(activeUser = "bukola") {
  const result = [];
  const isTalatu = activeUser === "talatu";
  Object.entries(RACI_DATA).forEach(([section, areas]) => {
    areas.forEach(({ area, bukola }) => {
      const tData = isTalatu ? (RACI_TALATU[section] || []).find(x => x.area === area) : null;
      const role = isTalatu ? (tData ? tData.talatu : "") : bukola;
      if (isOwnershipRole(role)) {
        result.push({ section, area, role });
      }
    });
  });
  return result;
}

function getCoverageData(entries, activeUser = "bukola") {
  const ownershipAreas = getOwnershipAreas(activeUser);
  return ownershipAreas.map(({ section, area, role }) => {
    const count = entries.filter(e =>
      (e.sectionAreas || []).some(sa => sa.section === section && sa.area === area)
    ).length;
    return { section, area, role, count };
  });
}

// ─── GAP TRACKER VIEW ────────────────────────────────────────────────────────

function GapTrackerView({ entries, onLogForArea, activeUser = "bukola" }) {
  const coverage = getCoverageData(entries, activeUser);
  const total = coverage.length;
  const covered = coverage.filter(c => c.count > 0).length;
  const gaps = coverage.filter(c => c.count === 0);
  const pct = total === 0 ? 0 : Math.round((covered / total) * 100);

  const [filterSection, setFilterSection] = useState("ALL");
  const [showCovered, setShowCovered] = useState(false);

  const ownershipSections = [...new Set(coverage.map(c => c.section))];

  const visibleGaps = gaps.filter(g =>
    filterSection === "ALL" || g.section === filterSection
  );
  const visibleCovered = coverage.filter(c =>
    c.count > 0 && (filterSection === "ALL" || c.section === filterSection)
  );

  const roleOrder = { "A/R": 0, "A": 1, "R": 2 };
  const sorted = [...visibleGaps].sort((a, b) =>
    (roleOrder[a.role] ?? 9) - (roleOrder[b.role] ?? 9)
  );

  const barColor = pct >= 80 ? "#2d6a4f" : pct >= 50 ? "#7a5800" : "#7a2000";
  const barTextColor = pct >= 80 ? "#7fddaa" : pct >= 50 ? "#e8a820" : "#ff8060";

  const sel = {
    background: "#F4F4F0", border: "1px solid #D8D8CE", color: "#3D8A20",
    borderRadius: 6, padding: "6px 10px", fontSize: 12,
  };

  return (
    <div>
      {/* Coverage score header */}
      <div style={{ background: "#EBF7D8", border: "1px solid #D8D8CE", borderRadius: 10, padding: "18px 20px", marginBottom: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
          <div>
            <div style={{ color: "#3D8A20", fontSize: 10, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", marginBottom: 4 }}>
              Ownership Coverage

              {covered} <span style={{ color: "#8A8A7A", fontSize: 16 }}>/ {total}</span>
            </div>
            <div style={{ color: "#8A8A7A", fontSize: 12, marginTop: 4 }}>
              areas with at least one entry

          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ color: barTextColor, fontSize: 32, fontWeight: 700, fontFamily: "Manrope, Arial, sans-serif", lineHeight: 1 }}>{pct}%</div>
            <div style={{ color: "#8A8A7A", fontSize: 11, marginTop: 2 }}>{gaps.length} gaps remaining</div>
          </div>
        </div>

        {/* Progress bar */}
        <div style={{ background: "#D8D8CE", borderRadius: 20, height: 8, overflow: "hidden" }}>
          <div style={{
            width: `${pct}%`, height: "100%",
            background: `linear-gradient(90deg, ${barColor}, ${barTextColor})`,
            borderRadius: 20, transition: "width 0.6s ease",
          }} />
        </div>

        {/* Role breakdown */}
        <div style={{ display: "flex", gap: 16, marginTop: 12, flexWrap: "wrap" }}>
          {["A/R", "A", "R"].map(role => {
            const roleAreas = coverage.filter(c => c.role === role);
            const roleCovered = roleAreas.filter(c => c.count > 0).length;

                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>

                    <button
                      onClick={() => onLogForArea(g.section, g.area, g.role)}

                        background: "#1A3D10", border: "1px solid #6a4800",

}

// ─── SKILLS TRACKER VIEW ─────────────────────────────────────────────────────

function SkillsTrackerView({ entries, onEdit, onDelete }) {
  const [selectedSkill, setSelectedSkill] = useState(null);
  const [search, setSearch] = useState("");

  // Build skills map: skill -> entries
  const skillsMap = {};
  entries.forEach(e => {
    (e.skills || []).forEach(s => {
      if (!skillsMap[s]) skillsMap[s] = [];
      skillsMap[s].push(e);
    });
  });

  const allSkillNames = Object.keys(skillsMap).sort((a, b) => skillsMap[b].length - skillsMap[a].length);
  const filteredSkills = allSkillNames.filter(s => s.toLowerCase().includes(search.toLowerCase()));

  const skillEntries = selectedSkill ? (skillsMap[selectedSkill] || []).sort((a, b) => b.date.localeCompare(a.date)) : [];

  return (
    <div>
      <div style={{ marginBottom: 20 }}>
        <h2 style={{ color: "#1A3D10", fontFamily: "'DM Serif Display', Georgia, serif", margin: "0 0 4px", fontSize: 18 }}>
          Skills Tracker
        </h2>
        <p style={{ color: "#3D8A20", fontSize: 12, margin: 0 }}>
          {allSkillNames.length === 0
            ? "No skills logged yet. Add skills to entries using the Skills Tracker field."
            : `${allSkillNames.length} skill${allSkillNames.length !== 1 ? "s" : ""} across ${entries.filter(e => (e.skills || []).length > 0).length} entries.`}
        </p>
      </div>

      {allSkillNames.length === 0 ? (
        <div style={{ textAlign: "center", padding: "60px 0" }}>
          <div style={{ color: "#D8D8CE", fontSize: 40, marginBottom: 10 }}>◈</div>
          <div style={{ color: "#8A8A7A", fontSize: 14 }}>Open any entry → Edit → add skills to start building your tracker.</div>
        </div>
      ) : (
        <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>

          {/* ── Skills List Panel ── */}
          <div style={{ minWidth: 200, flex: "0 0 200px" }}>
            <input
              value={search}
              onChange={e => setSearch(e.target.value)}
              placeholder="Search skills…"
              style={{
                width: "100%", boxSizing: "border-box",
                background: "#F4F4F0", border: "1px solid #D8D8CE",
                color: "#8A8A7A", borderRadius: 6, padding: "7px 10px",
                fontSize: 12, marginBottom: 10,
              }}
            />
            {filteredSkills.map(skill => {
              const count = skillsMap[skill].length;
              const active = selectedSkill === skill;
              return (
                <div
                  key={skill}
                  onClick={() => setSelectedSkill(active ? null : skill)}

                    display: "flex", justifyContent: "space-between", alignItems: "center",
                    background: active ? "#1a0e2a" : "#EBF7D8",
                    border: `1px solid ${active ? "#3a1a5a" : "#1e1a14"}`,
                    borderRadius: 7, padding: "8px 12px", marginBottom: 5,
                    cursor: "pointer", transition: "all 0.15s",
                  }}
                  onMouseEnter={e => { if (!active) e.currentTarget.style.borderColor = "#2a1a3a"; }}
                  onMouseLeave={e => { if (!active) e.currentTarget.style.borderColor = "#1e1a14"; }}
                >
                  <span style={{ color: active ? "#c080ff" : "#a08060", fontSize: 12, fontWeight: active ? 700 : 400 }}>
                    {skill}
                  </span>
                  <span style={{
                    background: active ? "#3a1a5a" : "#1a1410",
                    color: active ? "#c080ff" : "#5a4030",
                    borderRadius: 10, padding: "1px 7px", fontSize: 10, fontWeight: 700,
                  }}>
                    {count}
                  </span>
                </div>
              );
            })}
          </div>

          {/* ── Entries Panel ── */}
          <div style={{ flex: 1, minWidth: 0 }}>
            {!selectedSkill ? (
              <div style={{ textAlign: "center", padding: "40px 0" }}>
                <div style={{ color: "#D8D8CE", fontSize: 30, marginBottom: 8 }}>◈</div>

            ) : (

                    ◈ {selectedSkill}
                  </span>
                  <span style={{ color: "#3D8A20", fontSize: 12 }}>
                    {skillEntries.length} entr{skillEntries.length !== 1 ? "ies" : "y"}
                  </span>
                </div>
                {skillEntries.map(e => (
                  <EntryCard
                    key={e.id}

// ─── MAIN APP ────────────────────────────────────────────────────────────────

function BILApp({ activeUser: initialActiveUser, onLogout, darkMode, onToggleDark }) {
  const [activeUser, setActiveUser] = useState(initialActiveUser || "bukola");
  const [entries, setEntries] = useState([]);
  const [companyEntries, setCompanyEntries] = useState([]);
  const [customTags, setCustomTags] = useState([]);
  const [allSkills, setAllSkills] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("log");
  const [showForm, setShowForm] = useState(false);
  const [editEntry, setEditEntry] = useState(null);
  const [prefilledArea, setPrefilledArea] = useState(null);
  const [showReport, setShowReport] = useState(false);
  const [search, setSearch] = useState("");
  const [fSection, setFSection] = useState("ALL");
  const [fRaci, setFRaci] = useState("ALL");
  const [dateFrom, setDateFrom] = useState("");
  const [dateTo, setDateTo] = useState("");
  const [showDateFilter, setShowDateFilter] = useState(false);

  useEffect(() => {
    const loadAll = async () => {
      try {
        const userId = initialActiveUser || "bukola";
        const [entriesData, tagsData, skillsData] = await Promise.all([
          dbLoadEntries(userId),
          dbLoadAppData(userId, 'custom_tags'),
          dbLoadAppData(userId, 'skills'),
        ]);
        setEntries(entriesData || []);
        setCustomTags(tagsData || []);
        setAllSkills(skillsData || []);
        // Load company entries (all founders) for company reports
        const loadCompany = async () => {
          try {
            const { data, error } = await supabase
              .from('entries')
              .select('*')
              .order('updated_at', { ascending: false });
            if (!error && data) {
              // Tag each entry with its owner and merge
              const all = data.map(r => ({ ...r.data, _userId: r.user_id }));
              setCompanyEntries(all);
            }
          } catch(e) { console.error('Company load:', e); }
        };
        loadCompany();
      } catch(e) {
        console.error('Load failed:', e);
      } finally {
        setLoading(false);
      }
    };
    loadAll();
  }, []);

  const persist = useCallback(async (updated, tags, skills) => {
    setEntries(updated);
    if (tags) setCustomTags(tags);
    if (skills) setAllSkills(skills);
    // Supabase saves happen in handleSave/handleDelete
  }, []);

  const handleSave = async (entry) => {
    const userId = initialActiveUser || "bukola";
    const idx = entries.findIndex(e => e.id === entry.id);
    const updated = idx >= 0 ? entries.map(e => e.id === entry.id ? entry : e) : [entry, ...entries];
    const newTags = [...new Set([...customTags, ...(entry.customTags || [])])];
    const newSkills = [...new Set([...allSkills, ...(entry.skills || [])])];
    setEntries(updated);
    setCustomTags(newTags);
    setAllSkills(newSkills);
    // Save to Supabase
    await dbSaveEntry(userId, entry);
    await dbSaveAppData(userId, 'custom_tags', newTags);
    await dbSaveAppData(userId, 'skills', newSkills);
  };

  const handleDelete = async (id) => {
    const userId = initialActiveUser || "bukola";
    const updated = entries.filter(e => e.id !== id);
    setEntries(updated);
    await dbDeleteEntry(userId, id);
  };

  const filtered = entries.filter(e => {
    const q = search.toLowerCase();
    const textOk = !q || e.title?.toLowerCase().includes(q) || e.summary?.toLowerCase().includes(q) || (e.customTags || []).some(t => t.toLowerCase().includes(q));
    const secOk = fSection === "ALL" || (e.sectionAreas || []).some(sa => sa.section === fSection);
    const raciOk = fRaci === "ALL" || (e.sectionAreas || []).some(sa => sa.role?.includes(fRaci));
    const dateOk = inRange(e.date || "", dateFrom, dateTo);
    return textOk && secOk && raciOk && dateOk;
  }).sort((a, b) => b.date.localeCompare(a.date));

  const roleCounts = ["R", "A", "C", "I"].map(r => ({
    r, count: entries.filter(e => (e.sectionAreas || []).some(sa => sa.role?.includes(r))).length
  }));

  const coverageData = getCoverageData(entries, activeUser);
  const totalOwnership = coverageData.length;
  const coveredOwnership = coverageData.filter(c => c.count > 0).length;
  const gapCount = totalOwnership - coveredOwnership;
  const coveragePct = totalOwnership === 0 ? 0 : Math.round((coveredOwnership / totalOwnership) * 100);
  const coverageBarColor = coveragePct >= 80 ? "#2d6a4f" : coveragePct >= 50 ? "#7a5800" : "#7a2000";
  const coverageTextColor = coveragePct >= 80 ? "#7fddaa" : coveragePct >= 50 ? "#e8a820" : "#ff8060";

  const navStyle = (id) => ({
    background: view === id ? "#3a2800" : "none",
    border: `1px solid ${view === id ? "#7a5000" : "#1e1a14"}`,
    color: view === id ? "#e8a820" : "#5a4030",
    borderRadius: 6, padding: "7px 16px", cursor: "pointer",
    fontSize: 12, fontWeight: 700, letterSpacing: 0.3, transition: "all 0.15s",
  });

  const sel = { background: "#F4F4F0", border: "1px solid #D8D8CE", color: "#3D8A20", borderRadius: 6, padding: "7px 10px", fontSize: 12 };

  return (
    <div style={{ minHeight: "100vh", background: "#F4F4F0", color: "#8A8A7A", fontFamily: "'DM Serif Display', Georgia, serif", paddingBottom: 60 }}>

      {/* Header */}
      <div style={{ background: darkMode ? "#1A3D10" : "#1A3D10", borderBottom: "2px solid #6CBF2E", padding: "14px 20px 12px", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ maxWidth: 900, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <img src={LOGO_WHITE} alt="Newllyon Limited" style={{ height: 32, width: "auto" }} />
              <div style={{ width: "1px", height: 28, background: "#2A5E18" }} />
              <div>
                <div style={{ color: "#8DD44A", fontSize: 9, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase" }}>Llyon Farms · {activeUser === "bukola" ? "Bukola Aluko" : "Talatu"}</div>
                <div style={{ color: "#EBF7D8", fontFamily: "'DM Serif Display', Georgia, serif", fontSize: 16, fontWeight: 400, letterSpacing: -0.3, lineHeight: 1.2 }}>Business Impact Log</div>
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              {/* User switcher — preview mode */}
              <div style={{ display: "flex", gap: 4, background: "#0e2a0e", border: "1px solid #2A5E18", borderRadius: 8, padding: 3 }}>
                {["bukola", "talatu"].map(u => (
                  <button
                    key={u}
                    onClick={() => setActiveUser(u)}
                    style={{
                      background: activeUser === u ? "#6CBF2E" : "none",
                      border: "none",

                      borderRadius: 6, padding: "4px 10px",
                      cursor: "pointer", fontSize: 11, fontWeight: 700,
                      transition: "all 0.15s",
                    }}
                  >
                    {u === "bukola" ? "Bukola" : "Talatu"}
                  </button>
                ))}
              </div>
              <button
                onClick={onToggleDark}
                style={{ background: "none", border: "1px solid #2A5E18", color: "#8DD44A", borderRadius: 6, padding: "5px 10px", cursor: "pointer", fontSize: 11 }}

              style={{
                background: "#EBF7D8", border: "1px solid #D8D8CE", borderRadius: 8,
                padding: "10px 14px", marginBottom: 16, cursor: "pointer",
                transition: "border-color 0.15s",
              }}
              onMouseEnter={e => e.currentTarget.style.borderColor = "#6CBF2E"}
              onMouseLeave={e => e.currentTarget.style.borderColor = "#D8D8CE"}
            >
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                <div style={{ color: "#3D8A20", fontSize: 10, fontWeight: 700, letterSpacing: 0.8, textTransform: "uppercase" }}>
                  Ownership Coverage
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  {gapCount > 0 && (
                    <span style={{ background: "#2a1008", border: "1px solid #5a2000", color: "#ff8060", borderRadius: 10, padding: "1px 8px", fontSize: 10, fontWeight: 700 }}>
                      {gapCount} gaps
                    </span>
                  )}
                  <span style={{ color: coverageTextColor, fontSize: 13, fontWeight: 700 }}>{coveragePct}%</span>
                  <span style={{ color: "#8A8A7A", fontSize: 10 }}>→ View</span>
                </div>
              </div>
              <div style={{ background: "#D8D8CE", borderRadius: 20, height: 5, overflow: "hidden" }}>
                <div style={{
                  width: `${coveragePct}%`, height: "100%",
                  background: `linear-gradient(90deg, ${coverageBarColor}, ${coverageTextColor})`,
                  borderRadius: 20, transition: "width 0.6s ease",
                }} />
              </div>
              <div style={{ color: "#8A8A7A", fontSize: 10, marginTop: 4 }}>
                {coveredOwnership} of {totalOwnership} ownership areas logged · tap to see gaps
              </div>
            </div>

            {/* Filters */}
            <div style={{ display: "flex", gap: 8, marginBottom: showDateFilter ? 0 : 16, flexWrap: "wrap" }}>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search entries…"
                style={{ flex: 1, minWidth: 160, background: "#F4F4F0", border: "1px solid #D8D8CE", color: "#8A8A7A", borderRadius: 6, padding: "7px 12px", fontSize: 13 }} />
              <select value={fSection} onChange={e => setFSection(e.target.value)} style={sel}>
                <option value="ALL">All Sections</option>
                {Object.keys(RACI_DATA).map(s => <option key={s} value={s}>{s}</option>)}
              </select>
              <button
                onClick={() => setShowDateFilter(v => !v)}
                style={{
                  background: (dateFrom || dateTo) ? "#3a2800" : "#EBF7D8",
                  border: `1px solid ${(dateFrom || dateTo) ? "#7a5500" : "#1e1a14"}`,
                  color: (dateFrom || dateTo) ? "#e8a820" : "#4a3820",
                  borderRadius: 6, padding: "7px 12px", cursor: "pointer", fontSize: 12, fontWeight: 600,
                }}
              >
                📅 {dateFrom || dateTo ? "Date: Active" : "Date Range"}
              </button>
            </div>
            {showDateFilter && (
              <div style={{ marginBottom: 16 }}>
                <DateRangePicker from={dateFrom} to={dateTo} onChange={(f, t) => { setDateFrom(f); setDateTo(t); }} />
              </div>
            )}

            {loading ? (
              <div style={{ color: "#D8D8CE", textAlign: "center", padding: 60 }}>Loading…</div>
            ) : filtered.length === 0 ? (
              <div style={{ textAlign: "center", padding: "60px 0" }}>
                <div style={{ color: "#D8D8CE", fontSize: 40, marginBottom: 10 }}>◎</div>
                <div style={{ color: "#8A8A7A", fontSize: 14 }}>
                  {entries.length === 0 ? "No entries yet. Tap + Log Entry to start." : "No entries match your filters."}
                </div>
              </div>
            ) : filtered.map(e => (
              <EntryCard key={e.id} entry={e}
                onEdit={entry => { setEditEntry(entry); setShowForm(true); }}
                onDelete={handleDelete}
                showSkills={activeUser === "bukola"} />
            ))}
          </>
        )}

        {view === "gaps" && (
          <>
            <div style={{ marginBottom: 20 }}>
              <h2 style={{ color: "#1A3D10", fontFamily: "'DM Serif Display', Georgia, serif", margin: "0 0 4px", fontSize: 18 }}>Gap Tracker</h2>
              <p style={{ color: "#3D8A20", fontSize: 12, margin: 0 }}>All areas where you hold A/R, A, or R — showing which have no entries yet.</p>
            </div>
            <GapTrackerView
              entries={entries}
              activeUser={activeUser}
              onLogForArea={(section, area, role) => {
                setPrefilledArea({ section, area, role });
                setEditEntry(null);
                setShowForm(true);
              }}
            />
          </>
        )}

        {view === "skills" && activeUser === "bukola" && (
          <SkillsTrackerView
            entries={entries}
            onEdit={entry => { setEditEntry(entry); setShowForm(true); }}
            onDelete={handleDelete}
          />
        )}

        {view === "matrix" && <MatrixView activeUser={activeUser} />}
      </div>

      {/* Preview banner */}
      {activeUser === "talatu" && (
        <div style={{
          background: "#FBF0A0", border: "1px solid #F2D024",
          borderRadius: 8, padding: "8px 16px", margin: "0 16px 0",
          maxWidth: 900, marginLeft: "auto", marginRight: "auto",
          display: "flex", alignItems: "center", gap: 10,
        }}>
          <span style={{ fontSize: 14 }}>👁</span>
          <span style={{ color: "#2A1E00", fontSize: 12, fontWeight: 600, fontFamily: "Manrope, Arial, sans-serif" }}>
            Preview Mode — Viewing as Talatu. Skills Tracker and Skills fields are not available in her experience.
          </span>
        </div>
      )}

      {showForm && (
        <Modal onClose={() => { setShowForm(false); setEditEntry(null); setPrefilledArea(null); }} wide>
          <LogForm
            initial={editEntry || (prefilledArea ? {
              id: uid(), date: today(), title: "", type: "Achievement",
              sectionAreas: [{ section: prefilledArea.section, area: prefilledArea.area, role: prefilledArea.role }],
              categories: [], customTags: [], skills: [], problem: "",
              summary: "", action: "", impact: "", metrics: "", strategicNotes: "",
              reflection_worked: "", reflection_didnt: "", reflection_double_down: "",
            } : null)}
            onSave={handleSave}
            onClose={() => { setShowForm(false); setEditEntry(null); setPrefilledArea(null); }}
            allCustomTags={customTags}
            allSkills={allSkills}
            showSkills={activeUser === "bukola"}
          />
        </Modal>
      )}

      {showReport && (
        <Modal onClose={() => setShowReport(false)} wide>
          <ReportView entries={entries} companyEntries={companyEntries} activeUser={activeUser} allCustomTags={customTags} allSkills={activeUser === "bukola" ? allSkills : []} onClose={() => setShowReport(false)} />
        </Modal>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<AuthWrapper />);
</script>
</body>
</html>
